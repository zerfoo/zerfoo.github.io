baseURL: https://zerfoo.feza.ai/
languageCode: en-us
title: Zerfoo - ML Framework for Go
theme: hugo-book

params:
  description: "Production-grade ML inference and training framework for Go. 245 tok/s on Gemma 3 1B. Zero CGo. 20 model architectures."
  BookTheme: auto
  BookToC: true
  BookSection: docs
  BookLogo: /logo.png
  BookMenuBundle: /menu
  BookSearch: true
  BookDateFormat: January 2, 2006
  images:
    - /zerfoo.png

enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: monokai
    lineNos: false

outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
